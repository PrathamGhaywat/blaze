<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blaze Manifest Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section h2 {
            color: #333;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="email"],
        input[type="url"],
        select,
        textarea {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 0;
            font-size: 0.95em;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="url"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2c3e50;
            box-shadow: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: monospace;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2c3e50;
            color: white;
        }

        .btn-primary:hover {
            background: #1a252f;
        }

        .btn-secondary {
            background: #e8e8e8;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .target-item {
            border: 1px solid #ddd;
            border-radius: 0;
            padding: 20px;
            background: #f9f9f9;
        }

        .target-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .target-header h3 {
            color: #2c3e50;
            font-size: 1.1em;
        }

        .bin-list {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 0;
            padding: 12px;
            margin-top: 10px;
        }

        .bin-item {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .bin-item:last-child {
            border-bottom: none;
        }

        .bin-item input {
            flex: 1;
            margin: 0;
        }

        .output-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 0;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .output-section h3 {
            color: #333;
            margin-bottom: 10px;
        }

        #jsonOutput {
            background: white;
            border: 1px solid #ddd;
            border-radius: 0;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.6;
            color: #333;
            overflow-x: auto;
            white-space: pre;
            flex: 1;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 0;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }

            .output-section {
                position: static;
                max-height: none;
            }
        }

        .help-text {
            font-size: 0.85em;
            color: #666;
            font-style: italic;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Blaze Manifest Generator</h1>
            <p>Create cross-platform package manifests for Blaze</p>
        </div>

        <div class="content">
            <div class="section">
                <h2>Package Information</h2>

                <div class="form-group">
                    <label for="pkgName">Package Name</label>
                    <input type="text" id="pkgName" placeholder="e.g., node, gh, cmake">
                    <span class="help-text">Unique identifier for the package</span>
                </div>

                <div class="form-group">
                    <label for="pkgVersion">Version</label>
                    <input type="text" id="pkgVersion" placeholder="e.g., 2.87.3, 1.0.0">
                    <span class="help-text">Semantic version recommended</span>
                </div>

                <div class="form-group">
                    <label for="pkgDescription">Description</label>
                    <textarea id="pkgDescription" placeholder="Brief description of the package"></textarea>
                </div>

                <div class="form-group">
                    <label for="pkgHomepage">Homepage URL</label>
                    <input type="url" id="pkgHomepage" placeholder="https://example.com">
                </div>

                <h2 style="margin-top: 20px;">Author Information</h2>

                <div class="form-group">
                    <label for="authorName">Author Name</label>
                    <input type="text" id="authorName" placeholder="e.g., John Doe">
                </div>

                <div class="form-group">
                    <label for="authorEmail">Author Email</label>
                    <input type="email" id="authorEmail" placeholder="author@example.com">
                </div>

                <h2 style="margin-top: 20px;">Repository</h2>

                <div class="form-group">
                    <label for="repoType">Repository Type</label>
                    <select id="repoType">
                        <option>git</option>
                        <option>hg</option>
                        <option>svn</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="repoUrl">Repository URL</label>
                    <input type="url" id="repoUrl" placeholder="https://github.com/user/repo">
                </div>

                <div class="form-group">
                    <label for="pkgLicense">License</label>
                    <input type="text" id="pkgLicense" placeholder="e.g., MIT, Apache-2.0">
                </div>

                <h2 style="margin-top: 20px;">Targets (Platforms)</h2>

                <div id="targetsList"></div>

                <button class="btn-primary" onclick="addTarget()">+ Add Target</button>
            </div>

            <div class="section">
                <div class="output-section">
                    <div>
                        <h3>Generated Manifest</h3>
                        <div class="success-message" id="successMessage">✓ Copied to clipboard!</div>
                    </div>
                    <pre id="jsonOutput">{}</pre>
                    <div class="button-group">
                        <button class="btn-primary" onclick="copyToClipboard()">Copy JSON</button>
                        <button class="btn-secondary" onclick="downloadJSON()">Download</button>
                        <button class="btn-secondary" onclick="resetForm()">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_TARGETS = [
            { name: 'windows-amd64', archiveType: 'zip' },
            { name: 'linux-amd64', archiveType: 'tar.gz' },
            { name: 'darwin-amd64', archiveType: 'tar.gz' }
        ];

        let targetsData = [];

        function generateJSON() {
            const manifest = {
                schema: 1,
                name: document.getElementById('pkgName').value || 'package-name',
                version: document.getElementById('pkgVersion').value || '1.0.0',
                description: document.getElementById('pkgDescription').value || 'Package description',
                homepage: document.getElementById('pkgHomepage').value || 'https://example.com',
                author: {
                    name: document.getElementById('authorName').value || 'Author Name',
                    email: document.getElementById('authorEmail').value || 'author@example.com'
                },
                repository: {
                    type: document.getElementById('repoType').value || 'git',
                    url: document.getElementById('repoUrl').value || 'https://github.com/user/repo'
                },
                license: document.getElementById('pkgLicense').value || 'MIT',
                targets: {}
            };

            // Collect targets
            const targetElements = document.querySelectorAll('.target-item');
            targetElements.forEach((element, index) => {
                const targetName = element.querySelector('.target-name').value;
                const archiveType = element.querySelector('.archive-type').value;
                const url = element.querySelector('.target-url').value;
                const sha256 = element.querySelector('.target-sha256').value;
                const extractRoot = element.querySelector('.extract-root').value;

                const binInputs = element.querySelectorAll('.bin-item input[type="text"]');
                const bins = Array.from(binInputs)
                    .map(input => input.value.trim())
                    .filter(v => v.length > 0);

                if (targetName && url && sha256 && bins.length > 0) {
                    const target = {
                        archive_type: archiveType,
                        url: url,
                        sha256: sha256,
                        bin: bins
                    };

                    if (extractRoot) {
                        target.extract_root = extractRoot;
                    }

                    manifest.targets[targetName] = target;
                }
            });

            document.getElementById('jsonOutput').textContent = JSON.stringify(manifest, null, 2);
        }

        function addTarget() {
            const targetId = `target-${Date.now()}`;
            const targetHTML = `
                <div class="target-item" id="${targetId}">
                    <div class="target-header">
                        <input type="text" class="target-name" placeholder="e.g., linux-amd64, windows-x64" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <button class="btn-danger" onclick="removeTarget('${targetId}')" style="margin-left: 10px;">Remove</button>
                    </div>

                    <div class="form-group">
                        <label>Archive Type</label>
                        <select class="archive-type">
                            <option>zip</option>
                            <option>tar.gz</option>
                            <option>tar</option>
                        </select>
                        <span class="help-text">Format of the archive file</span>
                    </div>

                    <div class="form-group">
                        <label>Download URL</label>
                        <input type="url" class="target-url" placeholder="https://github.com/...">
                    </div>

                    <div class="form-group">
                        <label>SHA256 Checksum</label>
                        <input type="text" class="target-sha256" placeholder="64 character hex string or sha256:...">
                        <span class="help-text">Get this from: sha256sum file.zip</span>
                    </div>

                    <div class="form-group">
                        <label>Extract Root (Optional)</label>
                        <input type="text" class="extract-root" placeholder="e.g., package-v1.0.0">
                        <span class="help-text">Folder name if archive extracts into a subdirectory</span>
                    </div>

                    <div class="form-group">
                        <label>Binary Paths</label>
                        <div class="bin-list" id="bins-${targetId}">
                            <div class="bin-item">
                                <input type="text" placeholder="e.g., bin/gh or bin/gh.exe" value="">
                                <button class="btn-secondary" onclick="addBinInput('bins-${targetId}')">+</button>
                            </div>
                        </div>
                        <span class="help-text">Relative paths to executables inside the archive</span>
                    </div>
                </div>
            `;

            document.getElementById('targetsList').insertAdjacentHTML('beforeend', targetHTML);
            generateJSON();
        }

        function removeTarget(targetId) {
            document.getElementById(targetId).remove();
            generateJSON();
        }

        function addBinInput(containerName) {
            const container = document.getElementById(containerName);
            const newInput = document.createElement('div');
            newInput.className = 'bin-item';
            newInput.innerHTML = `
                <input type="text" placeholder="e.g., bin/gh or bin/gh.exe" value="">
                <button class="btn-secondary" onclick="this.parentElement.remove(); generateJSON();">−</button>
            `;
            container.appendChild(newInput);
        }

        function copyToClipboard() {
            const json = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(json).then(() => {
                const msg = document.getElementById('successMessage');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 2000);
            });
        }

        function downloadJSON() {
            const json = document.getElementById('jsonOutput').textContent;
            const name = document.getElementById('pkgName').value || 'manifest';
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name}-manifest.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function resetForm() {
            document.getElementById('pkgName').value = '';
            document.getElementById('pkgVersion').value = '';
            document.getElementById('pkgDescription').value = '';
            document.getElementById('pkgHomepage').value = '';
            document.getElementById('authorName').value = '';
            document.getElementById('authorEmail').value = '';
            document.getElementById('repoUrl').value = '';
            document.getElementById('pkgLicense').value = 'MIT';
            document.getElementById('targetsList').innerHTML = '';

            DEFAULT_TARGETS.forEach(target => addTarget());
        }

        // Event listeners for real-time updates
        document.addEventListener('input', generateJSON);
        document.addEventListener('change', generateJSON);

        // Initialize with default targets
        window.addEventListener('load', () => {
            DEFAULT_TARGETS.forEach(target => addTarget());
        });
    </script>
</body>
</html>
